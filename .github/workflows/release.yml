name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

env:
  REGISTRY: ${{ vars.REGISTRY || 'docker.io' }}
  REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
  REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
  IMAGE_NAME: jobcontroller-manager

jobs:
  lint:
    name: Lint Code
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Check linter configuration
        run: make lint-config

      - name: Run linter
        run: make lint

  test:
    name: Run Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Running Tests
        run: |
          go mod tidy
          make test

  test-chart:
    name: Lint & Test Helm Chart
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: 'v3.14.0'

      - name: Install helm-unittest
        run: |
          helm plugin install https://github.com/helm-unittest/helm-unittest

      - name: Sync Helm Chart
        run: make helm-chart

      - name: Lint Helm Chart
        run: |
          helm lint ./dist/chart

      - name: Run Helm unit tests
        run: |
          make helm-test

  test-e2e:
    name: Run E2E Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Install the latest version of kind
        run: |
          curl -Lo ./kind https://kind.sigs.k8s.io/dl/latest/kind-linux-$(go env GOARCH)
          chmod +x ./kind
          sudo mv ./kind /usr/local/bin/kind

      - name: Verify kind installation
        run: kind version

      - name: Run E2E tests
        run: |
          go mod tidy
          make test-e2e

  test-helm-e2e:
    name: Run Helm E2E Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: 'v3.14.0'

      - name: Install the latest version of kind
        run: |
          curl -Lo ./kind https://kind.sigs.k8s.io/dl/latest/kind-linux-$(go env GOARCH)
          chmod +x ./kind
          sudo mv ./kind /usr/local/bin/kind

      - name: Verify kind installation
        run: kind version

      - name: Sync Helm Chart
        run: make helm-chart

      - name: Run Helm E2E tests
        run: |
          go mod tidy
          make test-helm-e2e

  release:
    name: Build and Push Release
    needs: [lint, test, test-chart, test-e2e, test-helm-e2e]
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: Build
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: 'v3.14.0'

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Parse and Extract Registry Metadata
        run: |
          RAW_REG="${{ env.REGISTRY }}"
          RAW_USER="${{ env.REGISTRY_USERNAME }}"
          IMG_NAME="${{ env.IMAGE_NAME }}"

          FIRST_PART=$(echo "$RAW_REG" | cut -d'/' -f1)
          if [[ "$FIRST_PART" == *.* ]]; then
            REGISTRY_HOST="$FIRST_PART"
            REG_PATH=$(echo "$RAW_REG" | cut -d'/' -f2-)
            if [ "$REG_PATH" = "$FIRST_PART" ]; then
              REG_PATH=""
            fi
          else
            REGISTRY_HOST="docker.io"
            REG_PATH="$RAW_REG"
          fi

          if [ -z "$REG_PATH" ]; then
            DOCKER_IMAGE_PRIMARY="${REGISTRY_HOST}/${RAW_USER}/${IMG_NAME}"
            HELM_REPO_URL="oci://${REGISTRY_HOST}/${RAW_USER}"
          else
            if [[ "$REG_PATH" == */* ]]; then
              DOCKER_IMAGE_PRIMARY="${REGISTRY_HOST}/${REG_PATH}"
              HELM_REPO_URL="oci://${REGISTRY_HOST}/$(dirname "$REG_PATH")"
            else
              DOCKER_IMAGE_PRIMARY="${REGISTRY_HOST}/${REG_PATH}/${IMG_NAME}"
              HELM_REPO_URL="oci://${REGISTRY_HOST}/${REG_PATH}"
            fi
          fi

          # Read base version from VERSION file and calculate APP_VERSION as major.minor.run_number
          BASE_VERSION=$(cat VERSION | tr -d '[:space:]')
          MAJOR_MINOR=$(echo "$BASE_VERSION" | cut -d'.' -f1,2)
          APP_VERSION="${MAJOR_MINOR}.${{ github.run_number }}"

          echo "REGISTRY_HOST=$REGISTRY_HOST" >> $GITHUB_ENV
          echo "DOCKER_IMAGE_PRIMARY=$DOCKER_IMAGE_PRIMARY" >> $GITHUB_ENV
          echo "HELM_REPO_URL=$HELM_REPO_URL" >> $GITHUB_ENV
          echo "APP_VERSION=$APP_VERSION" >> $GITHUB_ENV

      - name: Log in to Docker Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY_HOST }}
          username: ${{ env.REGISTRY_USERNAME }}
          password: ${{ env.REGISTRY_PASSWORD }}

      - name: Log in to Helm Registry
        run: |
          echo "${{ env.REGISTRY_PASSWORD }}" | helm registry login ${{ env.REGISTRY_HOST }} --username ${{ env.REGISTRY_USERNAME }} --password-stdin

      - name: Sync Helm Chart from Kustomize
        run: |
          make helm-chart

      - name: Build and Push Manager Image
        run: |
          make docker-build IMG=${{ env.DOCKER_IMAGE_PRIMARY }}:${{ env.APP_VERSION }}
          docker tag ${{ env.DOCKER_IMAGE_PRIMARY }}:${{ env.APP_VERSION }} ${{ env.DOCKER_IMAGE_PRIMARY }}:latest
          docker tag ${{ env.DOCKER_IMAGE_PRIMARY }}:${{ env.APP_VERSION }} ${{ env.DOCKER_IMAGE_PRIMARY }}:${{ github.sha }}
          make docker-push IMG=${{ env.DOCKER_IMAGE_PRIMARY }}:${{ env.APP_VERSION }}
          make docker-push IMG=${{ env.DOCKER_IMAGE_PRIMARY }}:latest
          make docker-push IMG=${{ env.DOCKER_IMAGE_PRIMARY }}:${{ github.sha }}

      - name: Package and Push Helm Chart
        run: |
          # Set the manager image repository in values.yaml dynamically
          sed -i "s|repository: controller|repository: ${DOCKER_IMAGE_PRIMARY}|g" dist/chart/values.yaml
          
          # Package the chart with the calculated version and app-version
          helm package dist/chart --version ${{ env.APP_VERSION }} --app-version ${{ env.APP_VERSION }}
          
          # Push to OCI registry
          helm push jobcontroller-${{ env.APP_VERSION }}.tgz ${{ env.HELM_REPO_URL }}
