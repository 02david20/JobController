name: Build and Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ${{ vars.REGISTRY || 'docker.io' }}
  REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
  REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
  IMAGE_NAME: jobcontroller

jobs:
  release:
    name: Build and Push
    runs-on: ubuntu-latest
    environment: Build
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: 'v3.14.0'

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Parse and Extract Registry Metadata
        run: |
          RAW_REG="${{ env.REGISTRY }}"
          RAW_USER="${{ env.REGISTRY_USERNAME }}"
          IMG_NAME="${{ env.IMAGE_NAME }}"

          FIRST_PART=$(echo "$RAW_REG" | cut -d'/' -f1)
          if [[ "$FIRST_PART" == *.* ]]; then
            REGISTRY_HOST="$FIRST_PART"
            REG_PATH=$(echo "$RAW_REG" | cut -d'/' -f2-)
            if [ "$REG_PATH" = "$FIRST_PART" ]; then
              REG_PATH=""
            fi
          else
            REGISTRY_HOST="docker.io"
            REG_PATH="$RAW_REG"
          fi

          if [ -z "$REG_PATH" ]; then
            DOCKER_IMAGE_PRIMARY="${REGISTRY_HOST}/${RAW_USER}/${IMG_NAME}"
            HELM_REPO_URL="oci://${REGISTRY_HOST}/${RAW_USER}"
          else
            if [[ "$REG_PATH" == */* ]]; then
              DOCKER_IMAGE_PRIMARY="${REGISTRY_HOST}/${REG_PATH}"
              HELM_REPO_URL="oci://${REGISTRY_HOST}/$(dirname "$REG_PATH")"
            else
              DOCKER_IMAGE_PRIMARY="${REGISTRY_HOST}/${REG_PATH}/${IMG_NAME}"
              HELM_REPO_URL="oci://${REGISTRY_HOST}/${REG_PATH}"
            fi
          fi

          echo "REGISTRY_HOST=$REGISTRY_HOST" >> $GITHUB_ENV
          echo "DOCKER_IMAGE_PRIMARY=$DOCKER_IMAGE_PRIMARY" >> $GITHUB_ENV
          echo "HELM_REPO_URL=$HELM_REPO_URL" >> $GITHUB_ENV

      - name: Log in to Docker Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY_HOST }}
          username: ${{ env.REGISTRY_USERNAME }}
          password: ${{ env.REGISTRY_PASSWORD }}

      - name: Log in to Helm Registry
        run: |
          echo "${{ env.REGISTRY_PASSWORD }}" | helm registry login ${{ env.REGISTRY_HOST }} --username ${{ env.REGISTRY_USERNAME }} --password-stdin

      - name: Sync Helm Chart from Kustomize
        run: |
          make sync-helm

      - name: Build and Push Manager Image
        run: |
          make docker-build IMG=${{ env.DOCKER_IMAGE_PRIMARY }}:${{ github.sha }}
          docker tag ${{ env.DOCKER_IMAGE_PRIMARY }}:${{ github.sha }} ${{ env.DOCKER_IMAGE_PRIMARY }}:latest
          make docker-push IMG=${{ env.DOCKER_IMAGE_PRIMARY }}:${{ github.sha }}
          make docker-push IMG=${{ env.DOCKER_IMAGE_PRIMARY }}:latest

      - name: Package and Push Helm Chart
        run: |
          # Extract the version from Chart.yaml
          CHART_VERSION=$(grep '^version:' deploy/charts/jobcontroller/Chart.yaml | awk '{print $2}')
          
          # Package the chart
          helm package deploy/charts/jobcontroller --version $CHART_VERSION --app-version latest
          
          # Push to OCI registry
          helm push jobcontroller-$CHART_VERSION.tgz ${{ env.HELM_REPO_URL }}
