apiVersion: rbac.authorization.k8s.io/v1
{{- if .Values.rbac.namespaced }}
kind: Role
{{- else }}
kind: ClusterRole
{{- end }}
metadata:
{{- if .Values.rbac.namespaced }}
  namespace: {{ .Release.Namespace }}
{{- end }}
  name: {{ include "jobcontroller.resourceName" (dict "suffix" "manager-role" "context" $) }}
rules:
- apiGroups:
  - batch
  resources:
  - jobs
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - batch
  resources:
  - jobs/status
  verbs:
  - get
- apiGroups:
  - dtools.dsandbox.io
  resources:
  - jobrunners
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - dtools.dsandbox.io
  resources:
  - jobrunners/finalizers
  verbs:
  - update
- apiGroups:
  - dtools.dsandbox.io
  resources:
  - jobrunners/status
  verbs:
  - get
  - patch
  - update
