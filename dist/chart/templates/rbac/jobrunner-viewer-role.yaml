{{- if .Values.rbac.helpers.enable }}
apiVersion: rbac.authorization.k8s.io/v1
{{- if .Values.rbac.namespaced }}
kind: Role
{{- else }}
kind: ClusterRole
{{- end }}
metadata:
{{- if .Values.rbac.namespaced }}
  namespace: {{ .Release.Namespace }}
{{- end }}
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/name: {{ include "jobcontroller.name" . }}
    helm.sh/chart: {{ .Chart.Name }}-{{ .Chart.Version | replace "+" "_" }}
    app.kubernetes.io/instance: {{ .Release.Name }}
  name: {{ include "jobcontroller.resourceName" (dict "suffix" "jobrunner-viewer-role" "context" $) }}
rules:
- apiGroups:
  - dtools.dsandbox.io
  resources:
  - jobrunners
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - dtools.dsandbox.io
  resources:
  - jobrunners/status
  verbs:
  - get
{{- end }}
